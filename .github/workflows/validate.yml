name: validate

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  tofu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: opentofu/setup-opentofu@v2
      - run: tofu fmt -check -recursive
      - run: tofu -chdir=tofu init -backend=false -input=false
      - run: tofu -chdir=tofu validate

  nix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: cachix/install-nix-action@v30
        with:
          # Authenticate GitHub fetches so flake-input resolution isn't rate
          # limited (429). The lock pins revs, this raises the API limit too.
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      # sops sopsFile path literals must resolve at eval; the real encrypted
      # files are created at deploy. Empty placeholders let the flake evaluate.
      - name: placeholder secret files
        run: |
          touch secrets/homelab.enc.env secrets/mullvad.wg.enc \
                secrets/cloudflared.creds.enc
          git add -A
      - run: nix flake check . --no-build

  # Real build smoke test: assemble every host's system closure on a native
  # x86_64-linux runner (the mac can't, it's aarch64-darwin). Catches build
  # breaks that eval alone misses. Generic packages come from cache.nixos.org;
  # only the config-specific derivations build here.
  nix-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: cachix/install-nix-action@v30
        with:
          # Authenticate GitHub fetches so flake-input resolution isn't rate
          # limited (429). The lock pins revs, this raises the API limit too.
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      # Persist /nix/store across runs so only changed config derivations
      # rebuild. gc trims the store to 5G before saving to stay under GitHub's
      # 10G per-repo cache cap; key rotates when any nix file changes.
      - uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('nix/**/*.nix') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 5G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-primary-key: never
      # Empty placeholders satisfy eval but fail the build: sops-nix parses the
      # sops files at build time. Generate valid ones (throwaway key) instead.
      - name: dummy sops secrets
        run: nix shell nixpkgs#age nixpkgs#sops --command bash .github/ci-dummy-secrets.sh
      - name: build all host toplevels
        run: |
          nix build --no-link --print-out-paths \
            .#nixosConfigurations.admin.config.system.build.toplevel \
            .#nixosConfigurations.ai.config.system.build.toplevel \
            .#nixosConfigurations.playground.config.system.build.toplevel \
            .#nixosConfigurations.postgres.config.system.build.toplevel \
            .#nixosConfigurations.cloudflared.config.system.build.toplevel \
            .#nixosConfigurations.garage.config.system.build.toplevel \
            .#nixosConfigurations.media.config.system.build.toplevel \
            .#nixosConfigurations.ccflare.config.system.build.toplevel \
            .#nixosConfigurations.vaultwarden.config.system.build.toplevel

  # Push the built host closures to the LAN Garage Nix cache so a re-apply pulls
  # them prebuilt. Runs on the in-cluster self-hosted runner, which reaches Garage
  # over the LAN, so nothing is exposed. Dormant until you set repo variable
  # HOMELAB_RUNNER=true (after the machine and the runner are up), so it doesn't
  # sit pending while there's no runner.
  nix-cache-push:
    if: vars.HOMELAB_RUNNER == 'true'
    needs: nix-build
    runs-on: homelab-core
    # The ephemeral ARC runner starts with an empty store. Without the Garage
    # substituter it rebuilds every host closure locally on a resource-limited
    # pod, which runs long enough to get OOM-killed mid-push. Pulling the
    # prebuilt closures from the cache (below) keeps this to seconds; the guard
    # fails fast instead of grinding if the cache ever misses.
    timeout-minutes: 20
    steps:
      # The ARC runner image is minimal; install-nix-action needs xz to unpack
      # the Nix tarball, and git for actions/checkout's tree handling.
      - name: install unpack deps (minimal runner image)
        run: sudo apt-get update && sudo apt-get install -y xz-utils git
      - uses: actions/checkout@v5
      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            extra-substituters = http://nix-cache.garage.internal:3902
            extra-trusted-public-keys = nix-cache:4PcFYVVhXuMebUpZjPR2BZTWYs+ZtJUPgZNEnYguWyA=
            fallback = true
            connect-timeout = 5
      # The real encrypted secrets (homelab.enc.env, mullvad.wg.enc,
      # cloudflared.creds.enc) are committed, so checkout already has them and the
      # closures built here match what the hosts build (sops-nix bakes the sops
      # file into the closure). Do NOT touch/empty them — empty files build
      # mismatched closures that would poison the cache.
      - name: sign + push host closures to Garage
        env:
          # Garage access key for the nix-cache bucket, and the cache signing key
          # (full `nix-store --generate-binary-cache-key` secret half).
          AWS_ACCESS_KEY_ID: ${{ secrets.NIX_CACHE_S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.NIX_CACHE_S3_SECRET_KEY }}
          NIX_CACHE_SIGNING_KEY: ${{ secrets.NIX_CACHE_SIGNING_KEY }}
        run: |
          umask 077
          keyfile="$RUNNER_TEMP/nix-cache.key"
          printf '%s' "$NIX_CACHE_SIGNING_KEY" > "$keyfile"
          trap 'rm -f "$keyfile"' EXIT
          store="s3://nix-cache?endpoint=http://192.168.178.109:3900&region=eu-central&secret-key=$keyfile"
          # This ephemeral runner shares the memory-starved k3s node (VM 104,
          # ~100% RAM). The original OOM came from realizing the closures with
          # max-jobs = cpu count (nine parallel builds). --max-jobs 1 alone caps
          # that to one build at a time, so a single invocation is memory-safe
          # AND evaluates the 9 configs once (a per-host loop re-evaluates the
          # whole flake 9x -- pure overhead, since eval isn't cache-substitutable).
          # The Garage substituter + cache.nixos.org supply everything prebuilt,
          # so a warm cache only fetches; --max-jobs 1 just caps the few config
          # derivations that genuinely rebuild after a module change.
          nix copy --max-jobs 1 --cores 2 --to "$store" \
            .#nixosConfigurations.admin.config.system.build.toplevel \
            .#nixosConfigurations.ai.config.system.build.toplevel \
            .#nixosConfigurations.playground.config.system.build.toplevel \
            .#nixosConfigurations.postgres.config.system.build.toplevel \
            .#nixosConfigurations.cloudflared.config.system.build.toplevel \
            .#nixosConfigurations.garage.config.system.build.toplevel \
            .#nixosConfigurations.media.config.system.build.toplevel \
            .#nixosConfigurations.ccflare.config.system.build.toplevel \
            .#nixosConfigurations.vaultwarden.config.system.build.toplevel

  k8s:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # kubeconform from its release binary (no setup-go, so no go.sum cache noise)
      - name: install kubeconform
        run: |
          curl -fsSL https://github.com/yannh/kubeconform/releases/download/v0.8.0/kubeconform-linux-amd64.tar.gz \
            | sudo tar -xz -C /usr/local/bin kubeconform
      - run: |
          kubeconform -strict -ignore-missing-schemas -summary \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            cluster/apps cluster/bootstrap/root-app.yaml

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: find . -name '*.sh' -not -path './.git/*' -exec shellcheck {} +
      - name: actionlint
        run: |
          bash <(curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint -color
