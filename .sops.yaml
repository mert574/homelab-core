# sops config. Everything is encrypted to one master age key, which the bootstrap
# installs on every host. No per-host recipients.
#
# One-time setup:
#   age-keygen -o age.key   # prints the age1... public key; put it in `master`
#                           # below. Keep age.key off the repo (gitignored) + safe.
#
# Encrypt / edit:
#   sops --encrypt secrets/homelab.env > secrets/homelab.enc.env
#   sops secrets/homelab.enc.env

keys:
  # TODO: replace with the real age public key from age-keygen
  - &master age1qqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqsj3xxxx

creation_rules:
  # every encrypted secret file under secrets/ -> the master key
  - path_regex: secrets/.*\.enc(\.env)?$
    key_groups:
      - age:
          - *master
