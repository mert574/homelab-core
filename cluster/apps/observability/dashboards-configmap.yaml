# Grafana dashboards-as-code, generated from pulse-pager observability/grafana/dashboards/
# (mirrors deploy/observability/install.sh's kubectl create configmap --from-file step).
# Regenerate on upstream change; the grafana chart mounts it via dashboardsConfigMaps.pulse.
apiVersion: v1
data:
  pulse-overview.json: |
    {
      "uid": "pulse-overview",
      "title": "Pulse Overview",
      "tags": ["pulse"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "editable": true,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "templating": { "list": [] },
      "annotations": { "list": [] },
      "panels": [
        {
          "type": "row",
          "title": "SLOs (p99 over 5m)",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 }
        },
        {
          "type": "stat",
          "title": "Dispatch lag p99",
          "description": "scheduler: dispatched_at - scheduled_at. SLO target 5s.",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 5, "w": 8, "x": 0, "y": 1 },
          "fieldConfig": { "defaults": { "unit": "s", "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null }, { "color": "red", "value": 5 } ] } }, "overrides": [] },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "value", "graphMode": "area" },
          "targets": [ { "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "histogram_quantile(0.99, sum(rate(pulse_schedule_dispatch_lag_seconds_bucket[5m])) by (le))" } ]
        },
        {
          "type": "stat",
          "title": "Verdict latency p99",
          "description": "alerting: decided_at - result.checked_at. SLO target 5s.",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 5, "w": 8, "x": 8, "y": 1 },
          "fieldConfig": { "defaults": { "unit": "s", "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null }, { "color": "red", "value": 5 } ] } }, "overrides": [] },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "value", "graphMode": "area" },
          "targets": [ { "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "histogram_quantile(0.99, sum(rate(pulse_verdict_latency_seconds_bucket[5m])) by (le))" } ]
        },
        {
          "type": "stat",
          "title": "Notify end-to-end p99",
          "description": "notifier: triggering check.checked_at to outbound send. SLO target 30s.",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 5, "w": 8, "x": 16, "y": 1 },
          "fieldConfig": { "defaults": { "unit": "s", "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null }, { "color": "red", "value": 30 } ] } }, "overrides": [] },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "value", "graphMode": "area" },
          "targets": [ { "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "histogram_quantile(0.99, sum(rate(pulse_pipeline_notify_latency_seconds_bucket[5m])) by (le))" } ]
        },
        {
          "type": "row",
          "title": "Pipeline throughput",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 6 }
        },
        {
          "type": "timeseries",
          "title": "Checks per second by outcome",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 7 },
          "fieldConfig": { "defaults": { "unit": "reqps", "custom": { "drawStyle": "line", "fillOpacity": 10, "stacking": { "mode": "normal" } } }, "overrides": [] },
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [ { "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "sum(rate(pulse_check_results_total[1m])) by (healthy)", "legendFormat": "healthy={{healthy}}" } ]
        },
        {
          "type": "timeseries",
          "title": "API request rate by status family",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 7 },
          "fieldConfig": { "defaults": { "unit": "reqps", "custom": { "drawStyle": "line", "fillOpacity": 10, "stacking": { "mode": "normal" } } }, "overrides": [] },
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [ { "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "sum(rate(pulse_http_requests_total[1m])) by (status)", "legendFormat": "{{status}}" } ]
        },
        {
          "type": "row",
          "title": "Health",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 15 }
        },
        {
          "type": "timeseries",
          "title": "Kafka consumer lag by group",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "fieldConfig": { "defaults": { "unit": "short", "custom": { "drawStyle": "line", "fillOpacity": 10 } }, "overrides": [] },
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [ { "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "sum(pulse_kafka_consumer_lag) by (group)", "legendFormat": "{{group}}" } ]
        },
        {
          "type": "timeseries",
          "title": "Service up",
          "description": "pulse_up per service (1 = serving). The service label comes from the scrape.",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "fieldConfig": { "defaults": { "unit": "short", "min": 0, "max": 1, "custom": { "drawStyle": "line", "fillOpacity": 10 } }, "overrides": [] },
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [ { "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "pulse_up", "legendFormat": "{{service}}" } ]
        }
      ]
    }
  pulse-pipeline.json: |
    {
      "uid": "pulse-pipeline",
      "title": "Pulse Pipeline End-to-End",
      "tags": ["pulse", "pipeline"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "editable": true,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "templating": { "list": [] },
      "annotations": { "list": [] },
      "panels": [
        {
          "type": "row",
          "title": "Stage latency (p50 / p99) — where the time goes",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 }
        },
        {
          "type": "timeseries",
          "title": "1. Dispatch lag (scheduler)",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 7, "w": 6, "x": 0, "y": 1 },
          "fieldConfig": { "defaults": { "unit": "s", "custom": { "drawStyle": "line", "fillOpacity": 10 } }, "overrides": [] },
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [
            { "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "histogram_quantile(0.5, sum(rate(pulse_schedule_dispatch_lag_seconds_bucket[5m])) by (le))", "legendFormat": "p50" },
            { "refId": "B", "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "histogram_quantile(0.99, sum(rate(pulse_schedule_dispatch_lag_seconds_bucket[5m])) by (le))", "legendFormat": "p99" }
          ]
        },
        {
          "type": "timeseries",
          "title": "2. Check duration (worker)",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 7, "w": 6, "x": 6, "y": 1 },
          "fieldConfig": { "defaults": { "unit": "s", "custom": { "drawStyle": "line", "fillOpacity": 10 } }, "overrides": [] },
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [
            { "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "histogram_quantile(0.5, sum(rate(pulse_check_duration_seconds_bucket[5m])) by (le))", "legendFormat": "p50" },
            { "refId": "B", "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "histogram_quantile(0.99, sum(rate(pulse_check_duration_seconds_bucket[5m])) by (le))", "legendFormat": "p99" }
          ]
        },
        {
          "type": "timeseries",
          "title": "3. Verdict latency (alerting)",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 7, "w": 6, "x": 12, "y": 1 },
          "fieldConfig": { "defaults": { "unit": "s", "custom": { "drawStyle": "line", "fillOpacity": 10 } }, "overrides": [] },
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [
            { "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "histogram_quantile(0.5, sum(rate(pulse_verdict_latency_seconds_bucket[5m])) by (le))", "legendFormat": "p50" },
            { "refId": "B", "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "histogram_quantile(0.99, sum(rate(pulse_verdict_latency_seconds_bucket[5m])) by (le))", "legendFormat": "p99" }
          ]
        },
        {
          "type": "timeseries",
          "title": "4. Notify end-to-end (notifier)",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 7, "w": 6, "x": 18, "y": 1 },
          "fieldConfig": { "defaults": { "unit": "s", "custom": { "drawStyle": "line", "fillOpacity": 10 } }, "overrides": [] },
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [
            { "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "histogram_quantile(0.5, sum(rate(pulse_pipeline_notify_latency_seconds_bucket[5m])) by (le))", "legendFormat": "p50" },
            { "refId": "B", "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "histogram_quantile(0.99, sum(rate(pulse_pipeline_notify_latency_seconds_bucket[5m])) by (le))", "legendFormat": "p99" }
          ]
        },
        {
          "type": "row",
          "title": "Throughput and health",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 8 }
        },
        {
          "type": "timeseries",
          "title": "Jobs dispatched vs consumed (per s)",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 7, "w": 8, "x": 0, "y": 9 },
          "fieldConfig": { "defaults": { "unit": "reqps", "custom": { "drawStyle": "line", "fillOpacity": 10 } }, "overrides": [] },
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [
            { "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "sum(rate(pulse_schedule_jobs_dispatched_total[1m]))", "legendFormat": "dispatched" },
            { "refId": "B", "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "sum(rate(pulse_worker_jobs_consumed_total[1m]))", "legendFormat": "consumed" }
          ]
        },
        {
          "type": "timeseries",
          "title": "Checks per second by outcome",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 7, "w": 8, "x": 8, "y": 9 },
          "fieldConfig": { "defaults": { "unit": "reqps", "custom": { "drawStyle": "line", "fillOpacity": 10, "stacking": { "mode": "normal" } } }, "overrides": [] },
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [ { "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "sum(rate(pulse_check_results_total[1m])) by (healthy)", "legendFormat": "healthy={{healthy}}" } ]
        },
        {
          "type": "timeseries",
          "title": "Consumer lag by group",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 7, "w": 8, "x": 16, "y": 9 },
          "fieldConfig": { "defaults": { "unit": "short", "custom": { "drawStyle": "line", "fillOpacity": 10 } }, "overrides": [] },
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [ { "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "sum(pulse_kafka_consumer_lag) by (group)", "legendFormat": "{{group}}" } ]
        }
      ]
    }
  pulse-slo.json: |
    {
      "uid": "pulse-slo",
      "title": "Pulse SLO and Error Budget",
      "tags": ["pulse", "slo"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "editable": true,
      "refresh": "30s",
      "time": { "from": "now-6h", "to": "now" },
      "templating": { "list": [] },
      "annotations": { "list": [] },
      "panels": [
        {
          "type": "row",
          "title": "Pipeline latency SLOs (recorded p99)",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 }
        },
        {
          "type": "timeseries",
          "title": "Dispatch lag p99 (SLO 5s)",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 7, "w": 8, "x": 0, "y": 1 },
          "fieldConfig": { "defaults": { "unit": "s", "custom": { "drawStyle": "line", "fillOpacity": 10, "thresholdsStyle": { "mode": "line" } }, "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null }, { "color": "red", "value": 5 } ] } }, "overrides": [] },
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [ { "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "pulse:dispatch_lag:p99_5m", "legendFormat": "p99" } ]
        },
        {
          "type": "timeseries",
          "title": "Verdict latency p99 (SLO 5s)",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 7, "w": 8, "x": 8, "y": 1 },
          "fieldConfig": { "defaults": { "unit": "s", "custom": { "drawStyle": "line", "fillOpacity": 10, "thresholdsStyle": { "mode": "line" } }, "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null }, { "color": "red", "value": 5 } ] } }, "overrides": [] },
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [ { "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "pulse:verdict_latency:p99_5m", "legendFormat": "p99" } ]
        },
        {
          "type": "timeseries",
          "title": "Notify end-to-end p99 (SLO 30s)",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 7, "w": 8, "x": 16, "y": 1 },
          "fieldConfig": { "defaults": { "unit": "s", "custom": { "drawStyle": "line", "fillOpacity": 10, "thresholdsStyle": { "mode": "line" } }, "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null }, { "color": "red", "value": 30 } ] } }, "overrides": [] },
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [ { "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "pulse:notify_latency:p99_5m", "legendFormat": "p99" } ]
        },
        {
          "type": "row",
          "title": "Control-plane availability (SLO 99.9%)",
          "gridPos": { "h": 1, "w": 24, "x": 0, "y": 8 }
        },
        {
          "type": "stat",
          "title": "Availability (5m)",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 7, "w": 8, "x": 0, "y": 9 },
          "fieldConfig": { "defaults": { "unit": "percentunit", "min": 0, "max": 1, "thresholds": { "mode": "absolute", "steps": [ { "color": "red", "value": null }, { "color": "yellow", "value": 0.99 }, { "color": "green", "value": 0.999 } ] } }, "overrides": [] },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "value", "graphMode": "area" },
          "targets": [ { "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "1 - pulse:api_error_ratio:5m" } ]
        },
        {
          "type": "timeseries",
          "title": "Error budget burn (5xx ratio vs budget)",
          "description": "Budget for 99.9% is 0.001. Fast-burn page threshold is 14.4x budget; slow-burn ticket is 6x.",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 7, "w": 16, "x": 8, "y": 9 },
          "fieldConfig": { "defaults": { "unit": "percentunit", "custom": { "drawStyle": "line", "fillOpacity": 10 } }, "overrides": [] },
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "targets": [
            { "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "pulse:api_error_ratio:1h", "legendFormat": "1h" },
            { "refId": "B", "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "pulse:api_error_ratio:6h", "legendFormat": "6h" },
            { "refId": "C", "datasource": { "type": "prometheus", "uid": "prometheus" }, "expr": "vector(0.0144)", "legendFormat": "fast-burn threshold" }
          ]
        }
      ]
    }
kind: ConfigMap
metadata:
  name: pulse-dashboards
  namespace: observability
