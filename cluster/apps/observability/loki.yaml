# Loki (single binary): receives logs over its native OTLP endpoint (the collector
# forwards them), filesystem storage on a PVC. Values vendored from pulse-pager
# deploy/observability/loki/values.yaml (PVC trimmed for the node disk).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pulse-loki # fullnameOverride pins the service to pulse-loki regardless
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1" # alongside Tempo, before the collector
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: loki
    targetRevision: 6.24.0
    helm:
      valuesObject:
        fullnameOverride: pulse-loki
        deploymentMode: SingleBinary
        singleBinary:
          replicas: 0 # scaled down to stop the observability stack; bump back to 1 to restore
          persistence:
            enabled: true
            size: 4Gi
        # SingleBinary mode: zero the SimpleScalable targets, which the chart still
        # defaults to >0 (the validate template rejects both being non-zero).
        read:
          replicas: 0
        write:
          replicas: 0
        backend:
          replicas: 0
        chunksCache:
          enabled: false
        resultsCache:
          enabled: false
        loki:
          auth_enabled: false
          commonConfig:
            replication_factor: 1
          schemaConfig:
            configs:
              - from: "2024-01-01"
                store: tsdb
                object_store: filesystem
                schema: v13
                index:
                  prefix: index_
                  period: 24h
          storage:
            type: filesystem
          limits_config:
            allow_structured_metadata: true
            volume_enabled: true
        gateway:
          enabled: false
        lokiCanary:
          enabled: false
        test:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  # selfHeal off: the chart's loki.singleBinaryReplicas helper hardcodes 1
  # replica unless using object storage with >1 replicas, so
  # singleBinary.replicas: 0 above has no effect on the rendered manifest.
  # With selfHeal on, Argo CD reverts a manual `kubectl scale --replicas=0`
  # within seconds. Off, the app just sits OutOfSync while scaled down.
  syncPolicy:
    automated: { prune: true, selfHeal: false }
    syncOptions: [CreateNamespace=true, ServerSideApply=true]
