# Shared ingress Gateway (Cilium implements Gateway API). It gets a LoadBalancer
# IP from the lan-pool; cloudflared points the tunnel at that IP. Apps attach
# their own HTTPRoutes to this Gateway.
apiVersion: v1
kind: Namespace
metadata:
  name: gateway
---
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: cilium
spec:
  controllerName: io.cilium/gateway-controller
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: main
  namespace: gateway
spec:
  gatewayClassName: cilium
  # Pin a stable LB IP from the pool so cloudflared can target it permanently.
  addresses:
    - type: IPAddress
      value: "192.168.178.200"
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
