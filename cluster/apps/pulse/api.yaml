apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: pulse
spec:
  replicas: 1
  selector:
    matchLabels: { app: api }
  template:
    metadata:
      labels: { app: api }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9080"
        prometheus.io/path: /metrics
    spec:
      imagePullSecrets: [{ name: ghcr }]
      securityContext:
        runAsNonRoot: true
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: api
          image: ghcr.io/mert574/pulse-api:main
          ports:
            - { name: http, containerPort: 8080 }
            - { name: health, containerPort: 9080 }
          envFrom:
            - configMapRef: { name: pulse-config }
            - secretRef: { name: pulse-secrets }
          livenessProbe:
            httpGet: { path: /healthz, port: health }
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /readyz, port: health }
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          resources:
            requests: { cpu: 250m, memory: 256Mi }
            limits: { memory: 512Mi }
          volumeMounts:
            # the app reads PULSE_JWT_PRIVATE_KEY_PATH (/opt/pulse-pager/jwt-private.pem)
            - name: jwt
              mountPath: /opt/pulse-pager/jwt-private.pem
              subPath: jwt-private.pem
              readOnly: true
      volumes:
        - name: jwt
          secret:
            secretName: pulse-jwt
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: pulse
spec:
  selector: { app: api }
  ports:
    - port: 8080
      targetPort: 8080
