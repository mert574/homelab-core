# In-cluster Redis: kv layer + event bus (Redis Streams) for pulse, and also the
# execution queue for activepieces (cluster/apps/activepieces), which needs
# queued/in-flight runs to survive a restart -- hence the PVC below, even though
# pulse's own use of this instance would have tolerated losing it.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: pulse
spec:
  replicas: 1
  selector:
    matchLabels: { app: redis }
  template:
    metadata:
      labels: { app: redis }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: redis
          image: redis:8-alpine
          args: ["--appendonly", "yes"]
          ports:
            - containerPort: 6379
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - { name: data, mountPath: /data }
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { memory: 256Mi }
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: redis-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-data
  namespace: pulse
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: pulse
spec:
  selector: { app: redis }
  ports:
    - port: 6379
      targetPort: 6379
