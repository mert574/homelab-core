# ARC controller (Helm, OCI chart). Manages ephemeral runner scale sets.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arc-controller
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: ghcr.io/actions/actions-runner-controller-charts
    chart: gha-runner-scale-set-controller
    targetRevision: 0.14.2
  destination:
    server: https://kubernetes.default.svc
    namespace: arc-systems
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    # ServerSideApply: the actions.github.com CRDs (autoscalingrunnersets,
    # ephemeralrunners, …) exceed kubectl's 256KiB client-side last-applied
    # annotation limit, so client-side apply rejects them and the controller
    # crashloops on the missing CRDs. Server-side apply has no such limit.
    syncOptions: [CreateNamespace=true, ServerSideApply=true]
