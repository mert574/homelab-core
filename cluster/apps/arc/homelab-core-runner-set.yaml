# A runner scale set registered to this repo (mert574/homelab-core). A
# gha-runner-scale-set binds to one repo, and mert574 is a personal account (no
# org-level runner groups), so the `homelab` set (pulse-pager) can't serve this
# repo -- hence its own set. The nix-cache-push job in .github/workflows/validate.yml
# uses `runs-on: homelab-core`. Reuses the arc-github PAT secret; that PAT must
# have access to mert574/homelab-core.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arc-homelab-core-runner-set
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1" # after the controller (CRDs)
spec:
  project: default
  source:
    repoURL: ghcr.io/actions/actions-runner-controller-charts
    chart: gha-runner-scale-set
    targetRevision: 0.14.2
    helm:
      valuesObject:
        githubConfigUrl: "https://github.com/mert574/homelab-core"
        githubConfigSecret: arc-github # same PAT as the pulse + blog runner sets
        runnerScaleSetName: homelab-core
        minRunners: 0
        maxRunners: 2
        # The chart discovers the controller's ServiceAccount via `lookup`, which
        # returns empty during Argo's `helm template` (no live cluster at render
        # time) and fails the manager_role_binding template. Pin it explicitly.
        controllerServiceAccount:
          name: arc-controller-gha-rs-controller
          namespace: arc-systems
  destination:
    server: https://kubernetes.default.svc
    namespace: arc-runners
  syncPolicy:
    automated: { prune: true, selfHeal: true }
    syncOptions: [CreateNamespace=true]
