# Single image serves both the frontend and the API/execution engine on :80.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: activepieces
  namespace: activepieces
spec:
  replicas: 1
  selector:
    matchLabels: { app: activepieces }
  template:
    metadata:
      labels: { app: activepieces }
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: activepieces
          image: ghcr.io/activepieces/activepieces:latest
          ports:
            - { name: http, containerPort: 80 }
          envFrom:
            - secretRef: { name: activepieces-secrets }
          livenessProbe:
            httpGet: { path: /api/v1/health, port: http }
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /api/v1/health, port: http }
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
          resources:
            requests: { cpu: 250m, memory: 512Mi }
            limits: { memory: 1Gi }
---
apiVersion: v1
kind: Service
metadata:
  name: activepieces
  namespace: activepieces
spec:
  selector: { app: activepieces }
  ports:
    - port: 80
      targetPort: 80
