# Single image serves both the frontend and the API/execution engine on :80.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: activepieces
  namespace: activepieces
spec:
  replicas: 1
  selector:
    matchLabels: { app: activepieces }
  template:
    metadata:
      labels: { app: activepieces }
    spec:
      # The image has no non-root user set up (root only, plus an unused `node`
      # UID 1000 from its node base) -- upstream doesn't support running this
      # non-root, so don't force runAsNonRoot here like the other in-cluster apps.
      securityContext:
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: activepieces
          image: ghcr.io/activepieces/activepieces:latest
          ports:
            - { name: http, containerPort: 80 }
          envFrom:
            - secretRef: { name: activepieces-secrets }
          livenessProbe:
            httpGet: { path: /api/v1/health, port: http }
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /api/v1/health, port: http }
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
          # 1Gi OOMKilled the pod as soon as the AI piece's property (model
          # dropdown) got touched -- installing @activepieces/piece-ai and
          # spinning up execution sandboxes needs real headroom.
          resources:
            requests: { cpu: 250m, memory: 768Mi }
            limits: { memory: 2Gi }
---
apiVersion: v1
kind: Service
metadata:
  name: activepieces
  namespace: activepieces
spec:
  selector: { app: activepieces }
  ports:
    - port: 80
      targetPort: 80
