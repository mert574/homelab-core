# LibreChat web app. Public images (no ghcr pull secret). Chat state lives in the
# MongoDB PVC; uploads/logs are ephemeral (emptyDir) — fine to lose on restart.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: librechat
  namespace: librechat
spec:
  replicas: 1
  selector:
    matchLabels: { app: librechat }
  template:
    metadata:
      labels: { app: librechat }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000   # the node user in the image
        fsGroup: 1000     # writable emptyDir mounts
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: librechat
          image: ghcr.io/danny-avila/librechat:v0.8.7
          ports:
            - { name: http, containerPort: 3080 }
          envFrom:
            - configMapRef: { name: librechat-config }
            - secretRef: { name: librechat-secrets }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
          startupProbe:
            tcpSocket: { port: http }
            periodSeconds: 5
            failureThreshold: 30   # up to ~2.5 min for first boot
          readinessProbe:
            tcpSocket: { port: http }
            periodSeconds: 10
          livenessProbe:
            tcpSocket: { port: http }
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests: { cpu: 250m, memory: 384Mi }
            limits: { memory: 1Gi }
          volumeMounts:
            - { name: uploads, mountPath: /app/uploads }
            - { name: images, mountPath: /app/client/public/images }
            - { name: logs, mountPath: /app/api/logs }
            - name: config
              mountPath: /app/librechat.yaml
              subPath: librechat.yaml
              readOnly: true
      volumes:
        - { name: uploads, emptyDir: {} }
        - { name: images, emptyDir: {} }
        - { name: logs, emptyDir: {} }
        - name: config
          configMap: { name: librechat-file }
---
apiVersion: v1
kind: Service
metadata:
  name: librechat
  namespace: librechat
spec:
  selector: { app: librechat }
  ports:
    - port: 3080
      targetPort: 3080
