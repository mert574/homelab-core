# Must match the live PVC exactly (name, accessModes, storage, storageClassName)
# so Argo's first sync adopts the existing bound volume instead of recreating
# it -- this is where the real chat history lives.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongodb-data
  namespace: librechat
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
  storageClassName: local-path
