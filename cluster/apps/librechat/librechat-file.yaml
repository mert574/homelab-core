# The librechat.yaml app config, mounted at /app/librechat.yaml (CONFIG_PATH).
# Defines a single custom (OpenAI-format) endpoint pointing at ccflare's COMPAT
# route. ccflare translates OpenAI<->Anthropic, routes anthropic/* models to the
# claude-code (OAuth) accounts, and injects the Claude Code identity (system prompt
# + anthropic-beta header) so Opus/Sonnet are authorized — which the raw
# /v1/claude-code route does NOT do. Models MUST carry the `anthropic/` prefix:
# ccflare picks the provider family from it. apiKey is a throwaway (ccflare uses its
# own OAuth accounts).
apiVersion: v1
kind: ConfigMap
metadata:
  name: librechat-file
  namespace: librechat
data:
  librechat.yaml: |
    version: 1.2.8
    cache: true
    endpoints:
      custom:
        - name: "Claude (ccflare)"
          apiKey: "ccflare"
          baseURL: "http://192.168.178.111:8080/v1/ccflare/openai"
          models:
            default:
              - "anthropic/claude-opus-4-8"
              - "anthropic/claude-sonnet-4-5-20250929"
              - "anthropic/claude-haiku-4-5-20251001"
            fetch: false
          titleConvo: true
          titleModel: "anthropic/claude-haiku-4-5-20251001"
          modelDisplayLabel: "Claude"
    # Presets so a model is ALWAYS selected (no "send with nothing chosen"). Opus 4.8
    # is the default; the header dropdown switches between the three. prioritize:true
    # keeps a spec selected and hides the empty Agents state.
    modelSpecs:
      prioritize: true
      enforce: false
      list:
        - name: "opus-4-8"
          label: "Claude Opus 4.8"
          default: true
          description: "Most capable — default"
          preset:
            endpoint: "Claude (ccflare)"
            model: "anthropic/claude-opus-4-8"
        - name: "sonnet-4-5"
          label: "Claude Sonnet 4.5"
          description: "Balanced speed and quality"
          preset:
            endpoint: "Claude (ccflare)"
            model: "anthropic/claude-sonnet-4-5-20250929"
        - name: "haiku-4-5"
          label: "Claude Haiku 4.5"
          description: "Fast and cheap"
          preset:
            endpoint: "Claude (ccflare)"
            model: "anthropic/claude-haiku-4-5-20251001"
