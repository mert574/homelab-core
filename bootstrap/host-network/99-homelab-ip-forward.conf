# ip forwarding so the host can route the isolated ai bridge to the internet.
net.ipv4.ip_forward = 1

# The LAN is IPv4-only and the ISP's IPv6 path black-holes some hosts (outbound
# TLS to e.g. api.anthropic.com times out while IPv4 works). Disable IPv6 so
# nothing tries it and stalls.
net.ipv6.conf.all.disable_ipv6 = 1
net.ipv6.conf.default.disable_ipv6 = 1
